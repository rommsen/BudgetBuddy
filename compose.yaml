# BudgetBuddy — single source of truth for the container stack.
#
# This is the ONLY compose file. It is deployed verbatim by the post-receive hook
# on docker-host (see scripts/setup-deploy-remote.sh): `./scripts/deploy.sh` pushes
# main, the hook runs `docker build -t budgetbuddy:latest .` natively, copies THIS
# file to the stack dir, and runs `docker compose up -d`. The app therefore uses a
# pre-built `image:` (no `build:` directive here on purpose — the stack dir holds
# only this file, not the source).
#
# Port 5081 internally (matches the Dockerfile HEALTHCHECK and ASPNETCORE_URLS);
# Tailscale serves it at the tailnet host root via `--https=443 -> 127.0.0.1:5081`,
# so the PWA service worker scope `/` holds (infra-002 / ADR 0010). No host ports
# are published — access is Tailscale-only by design.
#
# Local dev does NOT use this file: run `dotnet watch run` (src/Server) + `npm run dev`.
# The former local-testing `docker-compose.yml` (port 5001, build: .) was removed
# 2026-06-20 to eliminate compose drift — it had diverged from the deployed config.
name: budgetbuddy

services:
  budgetbuddy-app:
    image: budgetbuddy:latest
    container_name: budgetbuddy-app
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - ASPNETCORE_URLS=http://+:5081
      - ASPNETCORE_ENVIRONMENT=Production
      - DATA_DIR=/app/data
      - BUDGETBUDDY_ENCRYPTION_KEY=${BUDGETBUDDY_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5081/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  tailscale-budgetbuddy:
    image: tailscale/tailscale:latest
    container_name: tailscale_budgetbuddy
    network_mode: "service:budgetbuddy-app"
    depends_on:
      - budgetbuddy-app
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--hostname=budgetbuddy
      - TS_USERSPACE=true
    volumes:
      - tailscale_state:/var/lib/tailscale
    command: >
      sh -c "
        tailscaled --state=/var/lib/tailscale/tailscaled.state --tun=userspace-networking &
        sleep 5 &&
        tailscale up --authkey=$$TS_AUTHKEY $$TS_EXTRA_ARGS &&
        sleep 2 &&
        tailscale serve --https=443 http://127.0.0.1:5081 &&
        tail -f /dev/null
      "
    restart: unless-stopped

volumes:
  tailscale_state:
