<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#08081a">
    <title>BudgetBuddy — Keine Verbindung</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <!--
      Branded offline floor for infra-002. Fully self-contained (inline styles,
      no external CSS/JS): it is the page shown precisely when the network/Tailscale
      is unreachable, so it cannot depend on anything that needs the server.
      Caches NO data — it is a static navigation fallback, nothing more.
      Colors/fonts mirror the design-system tokens (--bg-app #08081a,
      --text-primary #e8e8f0, --text-secondary #7a7a98, gradient teal->green->orange).
    -->
    <style>
        :root {
            --bg-app: #08081a;
            --text-primary: #e8e8f0;
            --text-secondary: #7a7a98;
            --neon-teal: #00d4aa;
            --neon-green: #00ff88;
            --neon-orange: #ff6b2c;
            --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-app);
            color: var(--text-primary);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
            gap: 1rem;
        }
        .icon { width: 88px; height: 88px; opacity: 0.95; }
        h1 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0.5rem 0 0;
            background: linear-gradient(135deg, var(--neon-teal) 0%, var(--neon-green) 50%, var(--neon-orange) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            max-width: 32ch;
            margin: 0;
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .retry {
            margin-top: 1rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--bg-app);
            background: var(--neon-green);
            border: none;
            border-radius: 0.5rem;
            padding: 0.7rem 1.4rem;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(0, 255, 136, 0.35);
        }
        .retry:hover { background: var(--neon-teal); box-shadow: 0 0 18px rgba(0, 212, 170, 0.4); }
    </style>
</head>
<body>
    <div class="wrap">
        <img class="icon" src="/icons/icon-192.png" alt="BudgetBuddy">
        <h1>Keine Verbindung</h1>
        <p>BudgetBuddy braucht Netz und Tailscale, um Live-Daten zu laden. Sobald die Verbindung wieder steht, lädt die App ganz normal.</p>
        <button class="retry" onclick="location.reload()">Erneut versuchen</button>
    </div>
</body>
</html>
