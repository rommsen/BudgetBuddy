<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BudgetBuddy app icon: a bold B inside a sync ring">
  <!--
    BudgetBuddy master app mark — "B im Sync-Ring" (Hybrid).
    Identity (B = BudgetBuddy) + function (sync ring = Bank -> YNAB).
    Signature gradient 135deg teal #00d4aa -> green #00ff88 -> orange #ff6b2c,
    matching .gradient-text (styles.css). Transparent background.
    viewBox 512x512; content kept within a ~410px circle for maskable safe-zone reuse.
  -->
  <defs>
    <!-- 135deg gradient: start top-left (x1,y1)=(0,0), end bottom-right (x2,y2)=(1,1) -->
    <linearGradient id="bbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#ff6b2c"/>
    </linearGradient>
    <!-- Dezenter Neon-Glow -->
    <filter id="bbGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.55" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#bbGlow)">
    <!-- Sync ring: two arc segments forming a continuous cycle, each ending in an arrowhead.
         Ring centered at (256,256), radius ~168, stroke ~26 (rounded caps). -->
    <g stroke="url(#bbGrad)" stroke-width="26" stroke-linecap="round" fill="none">
      <!-- Top-right arc sweeping clockwise down the right side -->
      <path d="M 256 88 A 168 168 0 0 1 396 348"/>
      <!-- Bottom-left arc sweeping clockwise back up the left side -->
      <path d="M 256 424 A 168 168 0 0 1 116 164"/>
    </g>
    <!-- Arrowheads (filled triangles) at the open ends, pointing along the flow.
         Each is a symmetric triangle centred on its arc endpoint, tip pointing
         tangentially in the direction of travel (clockwise loop). -->
    <g fill="url(#bbGrad)">
      <!-- End of top-right arc at (396,348): travel dir ~ down-left, tip leads the loop -->
      <path d="M 372 374 L 366 326 L 414 338 Z"/>
      <!-- End of bottom-left arc at (116,164): travel dir ~ up-right, tip leads the loop -->
      <path d="M 140 138 L 146 186 L 98 174 Z"/>
    </g>

    <!-- Bold geometric "B" centered, in the same gradient.
         Built from a vertical stem + two stacked bowls (Space Grotesk Bold spirit). -->
    <path fill="url(#bbGrad)" fill-rule="evenodd" d="
      M 196 168
      h 64
      a 50 50 0 0 1 0 100
      h 4
      a 52 52 0 0 1 0 104
      h -72
      z
      M 230 196
      v 64
      h 28
      a 32 32 0 0 0 0 -64
      z
      M 230 288
      v 60
      h 32
      a 30 30 0 0 0 0 -60
      z
    "/>
  </g>
</svg>
